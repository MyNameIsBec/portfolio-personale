services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio123
      POSTGRES_DB: portfolio_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://portfolio:portfolio123@db:5432/portfolio_db?schema=public"
      PORT: 3000
      FRONTEND_URL: "http://localhost:4200"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npx prisma db push && npx tsx prisma/seed.ts && node dist/index.js"

volumes:
  pgdata:
